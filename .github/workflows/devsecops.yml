permissions:
  actions: read
  contents: read
  security-events: write

name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]

jobs:

  sast:
  name: SAST - CodeQL
  runs-on: ubuntu-latest

  permissions:
    security-events: write
    contents: read

  steps:
    - uses: actions/checkout@v3

    - uses: github/codeql-action/init@v3
      with:
        languages: javascript

    - name: Install Dependencies
      run: npm install

    - uses: github/codeql-action/analyze@v3

  sca:
    name: SCA - Snyk
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - run: npm install

      - uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest

    steps:
      - name: Start App
        run: |
          npm install
          node app.js &
          sleep 10

      - name: Run ZAP Scan
        uses: zaproxy/action-full-scan@v0.7.0
        with:
          target: 'http://localhost:3000'

  deploy:
    needs: [sast, sca, dast]
    runs-on: ubuntu-latest

    steps:
      - run: echo "Secure Deployment Successful"
